<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OtaAdmin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
  .header { background: #1a1a1a; padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; }
  .header h1 { font-size: 20px; }
  .header .red { color: #e74c3c; }
  .back-btn { background: none; border: none; color: #1DB954; font-size: 22px; cursor: pointer; padding: 0 8px; }
  .page { display: none; padding: 24px 20px; max-width: 600px; margin: 0 auto; }
  .page.active { display: block; }
  .card { background: #1a1a1a; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 16px; color: #aaa; margin-bottom: 16px; }
  input, select { width: 100%; padding: 12px 14px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: #fff; font-size: 15px; margin-bottom: 12px; }
  input:focus, select:focus { outline: none; border-color: #1DB954; }
  .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
  .btn-green { background: #1DB954; color: #000; }
  .btn-outline { background: transparent; border: 1px solid #1DB954; color: #1DB954; margin-top: 8px; }
  .btn:active { opacity: 0.8; }
  .list-item { background: #2a2a2a; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .list-item:active { background: #333; }
  .list-item .name { font-size: 16px; font-weight: 600; }
  .list-item .sub { font-size: 13px; color: #888; margin-top: 2px; }
  .list-item .arrow { color: #555; font-size: 18px; }
  .list-thumb { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: #333; margin-right: 12px; }
  .section-title { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; }
  .msg { text-align: center; padding: 20px; color: #888; }
  .success { color: #1DB954; text-align: center; padding: 10px; font-size: 14px; }
  .error { color: #e74c3c; text-align: center; padding: 10px; font-size: 14px; }
  .divider { border: none; border-top: 1px solid #333; margin: 16px 0; }
  .song-item { background: #2a2a2a; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
  .song-item-top { display: flex; align-items: center; justify-content: space-between; }
  .song-info .title { font-weight: 600; font-size: 15px; }
  .song-info .artist { color: #888; font-size: 13px; margin-top: 2px; }
  .song-actions { display: flex; gap: 8px; margin-left: 10px; }
  .btn-edit { background: #2d6a4f; color: #fff; border: none; border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; font-weight: 600; }
  .btn-delete { background: #7b2d2d; color: #fff; border: none; border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; font-weight: 600; }
  .btn-edit:active { background: #1DB954; }
  .btn-delete:active { background: #e74c3c; }
  .edit-form { margin-top: 12px; border-top: 1px solid #444; padding-top: 12px; display: none; }
  .edit-form input { margin-bottom: 8px; font-size: 13px; padding: 10px 12px; }
  .edit-btns { display: flex; gap: 8px; }
  .btn-save { flex: 1; background: #1DB954; color: #000; border: none; border-radius: 8px; padding: 10px; font-weight: bold; cursor: pointer; font-size: 14px; }
  .btn-cancel { flex: 1; background: #333; color: #fff; border: none; border-radius: 8px; padding: 10px; font-weight: bold; cursor: pointer; font-size: 14px; }
  .token-logo { text-align: center; padding: 30px 0 20px; font-size: 36px; }
  .token-title { text-align: center; font-size: 22px; font-weight: bold; margin-bottom: 6px; }
  .token-sub { text-align: center; color: #888; font-size: 14px; margin-bottom: 24px; }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" id="backBtn" onclick="goBack()" style="display:none">&#8592;</button>
  <h1>Ota<span class="red">Admin</span></h1>
</div>

<!-- PAGE 1: TOKEN -->
<div class="page active" id="page-token">
  <div class="token-logo">🔑</div>
  <div class="token-title">Admin Login</div>
  <div class="token-sub">Apna GitHub Personal Access Token daalo</div>
  <div class="card">
    <input type="password" id="tokenInput" placeholder="GitHub Token (ghp_...)">
    <button class="btn btn-green" onclick="submitToken()">Login</button>
    <div id="tokenMsg"></div>
  </div>
</div>

<!-- PAGE 2: LANGUAGE LIST -->
<div class="page" id="page-languages">
  <div class="section-title">Languages</div>
  <div id="langList"></div>
  <button class="btn btn-outline" onclick="showAddLang()">+ Add New Language</button>
  <div id="addLangForm" style="display:none; margin-top:16px;">
    <div class="card">
      <h2>New Language</h2>
      <input type="text" id="newLangName" placeholder="Language name (e.g. Punjabi)">
      <button class="btn btn-green" onclick="addLanguage()">Create Language</button>
    </div>
  </div>
</div>

<!-- PAGE 3: PLAYLIST LIST -->
<div class="page" id="page-playlists">
  <div class="section-title" id="plPageLangLabel"></div>
  <div id="playlistList"></div>
  <button class="btn btn-outline" onclick="showAddPlaylist()">+ Add New Playlist</button>
  <div id="addPlaylistForm" style="display:none; margin-top:16px;">
    <div class="card">
      <h2>New Playlist</h2>
      <input type="text" id="newPlName" placeholder="Playlist name">
      <input type="url" id="newPlImage" placeholder="Cover image URL (optional)">
      <button class="btn btn-green" onclick="createPlaylist()">Create Playlist</button>
    </div>
  </div>
</div>

<!-- PAGE 4: SONGS IN PLAYLIST -->
<div class="page" id="page-songs">
  <div class="section-title" id="songsPageLabel"></div>
  <div id="songsList"></div>
  <hr class="divider">
  <div class="card">
    <h2>Add New Song</h2>
    <input type="text" id="songTitle" placeholder="Song Title *">
    <input type="text" id="songArtist" placeholder="Artist Name *">
    <input type="url" id="songAudio" placeholder="Audio URL (MP3/Cloudinary) *">
    <input type="url" id="songImage" placeholder="Cover Image URL *">
    <button class="btn btn-green" onclick="addSong()">Add Song</button>
    <div id="addSongMsg"></div>
  </div>
</div>

<script>
const REPO = "ajaydevota/otaplay-admin";
const FILE_PATH = "songs.json";
const API_BASE = "https://api.github.com";

let token = "";
let allSongs = [];
let fileSha = "";
let currentLang = "";
let currentPlaylist = "";
let pageHistory = [];

function goBack() {
  if (pageHistory.length > 0) {
    const prev = pageHistory.pop();
    showPage(prev, false);
  }
}

function showPage(pageId, addHistory = true) {
  if (addHistory) {
    const current = document.querySelector('.page.active');
    if (current) pageHistory.push(current.id);
  }
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  document.getElementById('backBtn').style.display = pageHistory.length > 0 ? 'block' : 'none';
}

async function submitToken() {
  token = document.getElementById('tokenInput').value.trim();
  if (!token) { showMsg('tokenMsg', 'Token daalo!', 'error'); return; }
  showMsg('tokenMsg', 'Connecting...', '');
  try {
    await loadSongs();
    showPage('page-languages');
    renderLanguages();
  } catch(e) {
    showMsg('tokenMsg', 'Token galat hai ya network error!', 'error');
  }
}

async function loadSongs() {
  const res = await fetch(`${API_BASE}/repos/${REPO}/contents/${FILE_PATH}`, {
    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
  });
  if (!res.ok) throw new Error('Failed');
  const data = await res.json();
  fileSha = data.sha;
  allSongs = JSON.parse(atob(data.content.replace(/\n/g, '')));
}

async function saveSongs() {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(allSongs, null, 2))));
  const res = await fetch(`${API_BASE}/repos/${REPO}/contents/${FILE_PATH}`, {
    method: 'PUT',
    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: 'Update songs', content, sha: fileSha })
  });
  if (!res.ok) throw new Error('Save failed');
  const data = await res.json();
  fileSha = data.content.sha;
}

function renderLanguages() {
  const langs = [...new Set(allSongs.map(s => s.language || 'Other'))];
  const el = document.getElementById('langList');
  if (langs.length === 0) { el.innerHTML = '<div class="msg">Koi language nahi hai. Naya banao!</div>'; return; }
  el.innerHTML = langs.map(lang => {
    const count = allSongs.filter(s => (s.language || 'Other') === lang).length;
    return `<div class="list-item" onclick="openLanguage('${escHtml(lang)}')">
      <div>
        <div class="name">${escHtml(lang)}</div>
        <div class="sub">${count} songs</div>
      </div>
      <span class="arrow">›</span>
    </div>`;
  }).join('');
}

function openLanguage(lang) {
  currentLang = lang;
  document.getElementById('plPageLangLabel').textContent = lang + ' — Playlists';
  renderPlaylists(lang);
  showPage('page-playlists');
}

function renderPlaylists(lang) {
  const songs = allSongs.filter(s => (s.language || 'Other') === lang);
  const playlists = [...new Set(songs.map(s => s.playlist))];
  const el = document.getElementById('playlistList');
  if (playlists.length === 0) { el.innerHTML = '<div class="msg">Koi playlist nahi. Naya banao!</div>'; return; }
  el.innerHTML = playlists.map(pl => {
    const plSongs = songs.filter(s => s.playlist === pl);
    const img = plSongs[0]?.imageurl || '';
    return `<div class="list-item" onclick="openPlaylist('${escHtml(pl)}')">
      ${img ? `<img class="list-thumb" src="${escHtml(img)}" onerror="this.style.display='none'">` : '<div class="list-thumb"></div>'}
      <div style="flex:1">
        <div class="name">${escHtml(pl)}</div>
        <div class="sub">${plSongs.length} songs</div>
      </div>
      <span class="arrow">›</span>
    </div>`;
  }).join('');
}

function openPlaylist(pl) {
  currentPlaylist = pl;
  document.getElementById('songsPageLabel').textContent = currentLang + ' › ' + pl;
  renderSongs(pl);
  showPage('page-songs');
}

function renderSongs(pl) {
  const songs = allSongs.filter(s => s.playlist === pl && (s.language || 'Other') === currentLang);
  const el = document.getElementById('songsList');
  if (songs.length === 0) { el.innerHTML = '<div class="msg">Koi song nahi. Neeche se add karo!</div>'; return; }
  el.innerHTML = songs.map((s) => {
    const realIdx = allSongs.findIndex(x =>
      x.title === s.title && x.artist === s.artist &&
      x.playlist === s.playlist && x.language === s.language &&
      x.audiourl === s.audiourl
    );
    return `
    <div class="song-item" id="song-card-${realIdx}">
      <div class="song-item-top">
        <div class="song-info">
          <div class="title">${escHtml(s.title)}</div>
          <div class="artist">${escHtml(s.artist || '')}</div>
        </div>
        <div class="song-actions">
          <button class="btn-edit" onclick="toggleEdit(${realIdx})">✏️ Edit</button>
          <button class="btn-delete" onclick="deleteSong(${realIdx})">🗑️ Delete</button>
        </div>
      </div>
      <div class="edit-form" id="edit-form-${realIdx}">
        <input type="text" id="edit-title-${realIdx}" value="${escAttr(s.title)}" placeholder="Song Title">
        <input type="text" id="edit-artist-${realIdx}" value="${escAttr(s.artist || '')}" placeholder="Artist Name">
        <input type="url" id="edit-audio-${realIdx}" value="${escAttr(s.audiourl || '')}" placeholder="Audio URL">
        <input type="url" id="edit-image-${realIdx}" value="${escAttr(s.imageurl || '')}" placeholder="Cover Image URL">
        <div class="edit-btns">
          <button class="btn-save" onclick="saveEdit(${realIdx})">💾 Save</button>
          <button class="btn-cancel" onclick="toggleEdit(${realIdx})">Cancel</button>
        </div>
        <div id="edit-msg-${realIdx}" style="margin-top:8px;font-size:13px;text-align:center;"></div>
      </div>
    </div>`;
  }).join('');
}

function toggleEdit(idx) {
  const form = document.getElementById(`edit-form-${idx}`);
  form.style.display = form.style.display === 'block' ? 'none' : 'block';
}

async function saveEdit(idx) {
  const title = document.getElementById(`edit-title-${idx}`).value.trim();
  const artist = document.getElementById(`edit-artist-${idx}`).value.trim();
  const audiourl = document.getElementById(`edit-audio-${idx}`).value.trim();
  const imageurl = document.getElementById(`edit-image-${idx}`).value.trim();
  const msgEl = document.getElementById(`edit-msg-${idx}`);
  if (!title || !artist || !audiourl || !imageurl) {
    msgEl.textContent = 'Saare fields bharo!'; msgEl.style.color = '#e74c3c'; return;
  }
  msgEl.textContent = 'Saving...'; msgEl.style.color = '#aaa';
  const oldSong = { ...allSongs[idx] };
  allSongs[idx] = { ...allSongs[idx], title, artist, audiourl, imageurl };
  try {
    await saveSongs();
    msgEl.textContent = '✓ Saved!'; msgEl.style.color = '#1DB954';
    setTimeout(() => { toggleEdit(idx); renderSongs(currentPlaylist); }, 800);
  } catch(e) {
    allSongs[idx] = oldSong;
    msgEl.textContent = 'Error! Dobara try karo.'; msgEl.style.color = '#e74c3c';
  }
}

async function deleteSong(idx) {
  const song = allSongs[idx];
  if (!confirm(`"${song.title}" delete karna chahte ho?`)) return;
  const removed = allSongs.splice(idx, 1);
  try {
    await saveSongs();
    renderSongs(currentPlaylist);
  } catch(e) {
    allSongs.splice(idx, 0, removed[0]);
    alert('Delete fail hua! Dobara try karo.');
  }
}

function showAddLang() {
  const f = document.getElementById('addLangForm');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

function addLanguage() {
  const name = document.getElementById('newLangName').value.trim();
  if (!name) return alert('Language name daalo!');
  currentLang = name;
  document.getElementById('plPageLangLabel').textContent = name + ' — Playlists';
  document.getElementById('playlistList').innerHTML = '<div class="msg">Koi playlist nahi. Naya banao!</div>';
  document.getElementById('addLangForm').style.display = 'none';
  document.getElementById('newLangName').value = '';
  showPage('page-playlists');
}

function showAddPlaylist() {
  const f = document.getElementById('addPlaylistForm');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

function createPlaylist() {
  const name = document.getElementById('newPlName').value.trim();
  const img = document.getElementById('newPlImage').value.trim();
  if (!name) return alert('Playlist name daalo!');
  currentPlaylist = name;
  document.getElementById('songsPageLabel').textContent = currentLang + ' › ' + name;
  document.getElementById('songsList').innerHTML = '<div class="msg">Koi song nahi. Neeche se add karo!</div>';
  document.getElementById('addPlaylistForm').style.display = 'none';
  document.getElementById('newPlName').value = '';
  document.getElementById('newPlImage').value = '';
  if (img) document.getElementById('songImage').value = img;
  showPage('page-songs');
}

async function addSong() {
  const title = document.getElementById('songTitle').value.trim();
  const artist = document.getElementById('songArtist').value.trim();
  const audiourl = document.getElementById('songAudio').value.trim();
  const imageurl = document.getElementById('songImage').value.trim();
  if (!title || !artist || !audiourl || !imageurl) {
    showMsg('addSongMsg', 'Saare fields bharo!', 'error'); return;
  }
  showMsg('addSongMsg', 'Saving...', '');
  try {
    allSongs.push({ title, artist, audiourl, imageurl, playlist: currentPlaylist, language: currentLang });
    await saveSongs();
    showMsg('addSongMsg', '✓ Song add ho gaya!', 'success');
    document.getElementById('songTitle').value = '';
    document.getElementById('songArtist').value = '';
    document.getElementById('songAudio').value = '';
    document.getElementById('songImage').value = '';
    renderSongs(currentPlaylist);
  } catch(e) {
    allSongs.pop();
    showMsg('addSongMsg', 'Error! Dobara try karo.', 'error');
  }
}

function showMsg(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = type;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function escAttr(s) {
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
